server:
  port: 8080

spring:
  application:
    name: minecraft-k8s-manager
  
  datasource:
    url: jdbc:h2:mem:minecraft_manager
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

logging:
  level:
    com.minecraft.k8s: DEBUG
