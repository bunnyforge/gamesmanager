---
apiVersion: v1
kind: Namespace
metadata:
  name: ${namespace}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: minecraft-server
  name: ${name}
  namespace: ${namespace}
spec:
  replicas: ${replicas}
  serviceName: ${name}
  selector:
    matchLabels:
      app: minecraft-server
  template:
    metadata:
      labels:
        app: minecraft-server
    spec:
      containers:
      - name: minecraft-server
        image: itzg/minecraft-server
        imagePullPolicy: Always
        ports:
        - containerPort: 25565
          protocol: TCP
        env:
        - name: EULA
          value: "TRUE"
        - name: TYPE
          value: "${serverType}"
        - name: ONLINE_MODE
          value: "${onlineMode}"
        - name: MAX_PLAYERS
          value: "${maxPlayers}"
        - name: INIT_MEMORY
          value: "${maxMemory}"
        - name: MAX_MEMORY
          value: "${maxMemory}"
        - name: JVM_XX_OPTS
          value: "${jvmOptions}"
        volumeMounts:
        - mountPath: /data
          name: data
        readinessProbe:
          exec:
            command:
            - mc-monitor
            - status
            - --host
            - localhost
            - --port
            - "25565"
          initialDelaySeconds: 180    # 改成 3 分钟，给足启动时间
          periodSeconds: 10           # 改成 10 秒，减少探测频率
          failureThreshold: 60        # 60 × 10 = 600 秒（10 分钟）容错
          timeoutSeconds: 5
        resources:
          requests:
            memory: "${memoryRequest}"
            cpu: "${cpuRequest}"
          limits:
            memory: "${memoryLimit}"
            cpu: "${cpuLimit}"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: ${storageClassName}
      resources:
        requests:
          storage: ${storageSize}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: minecraft-server
  name: ${name}
  namespace: ${namespace}
spec:
  ports:
  - port: 25565
    targetPort: 25565
    nodePort: ${nodePort}
    protocol: TCP
  selector:
    app: minecraft-server
  type: NodePort
