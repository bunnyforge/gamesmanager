server:
  port: 8080

spring:
  application:
    name: minecraft-k8s-manager
  
  datasource:
    url: jdbc:mysql://basic-tidb.tidb-cluster.svc.cluster.local:4000/gamesmanager?charset=utf8mb4&parseTime=true&serverTimezone=Asia/Shanghai&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456sS#
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

# 端口号配置
minecraft:
  port:
    start: 31003
    end: 32000

# Kubernetes 连接配置
kubernetes:
  kubeconfig:
    base64: ""

logging:
  level:
    root: INFO
    com.minecraft.k8s: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
